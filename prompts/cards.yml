holidays:
  mar8:
    title: "8 марта"
    fixed_line: "С 8 марта!"
    phrases:
      - "Пусть твоё сердце остаётся наполненным любовью✨"
      - "Всегда расцветай, как цветок💐"
      - "Пусть твоя жизнь будет наполнена красками"
      - "Сияй каждый день"
      - "Мир с тобой прекраснее"
    prompt_template: |
      Сделай поздравительную открытку к 8 марта на основе загруженного фото.

      КРИТИЧНО:
      - Сохрани узнаваемые черты лица девушки (глаза, нос, губы, форма лица), прическу и позу.
      - Не меняй возраст, пол, телосложение и выражение лица.
      - Сохрани общий силуэт и ракурс.

      СТИЛЬ:
      A bold editorial fashion illustration rendered in thick oil pastel or wax crayon,
      with chunky textured strokes on visible sketchbook paper.
      Chic and modern mood, expressive color blocks, minimal outlines, non-photorealistic.

      КОМПОЗИЦИЯ:
      - Вертикальная открытка, формат {format}.
      - Девушка — главный акцент, аккуратный праздничный фон к 8 марта.
      - Цвета: свежие весенние, выразительные, модные.

      ТЕКСТ НА ОТКРЫТКЕ (на русском, без ошибок):
      1) [{user_phrase}]
      2) [{fixed_line}]

      ТИПОГРАФИКА:
      - Текст читаемый, гармонично встроен в дизайн.
      - Не искажай и не сокращай фразы.
    default_quality: "high"
    model: "gpt-image-1.5"

  feb23:
    title: "23 февраля"
    fixed_line: "С Днем Защитника Отечества!"
    phrases:
      - "Силы и побед!💪"
      - "Настоящему герою"
      - "С праздником, защитник!"
    prompt_template: |
      Сделай открытку из этого фото. Сохрани черты лица и позу.
      Открытка должна быть посвящена 23 февраля с текстом [{user_phrase}] и [{fixed_line}].
      Открытка сделана в стиле: А bold editorial fashion illustration rendered in thick oil pastel or wax crayon, 
      with chunky, textured strokes on visible sketchbook paper. It should feel chic and modern, 
      focusing on outfit and pose through expressive color blocks rather than outlines or realism.
      Формат {format}.
    default_quality: "high"
    model: "gpt-image-1.5"

  birthday:
    title: "День рождения"
    fixed_line: "С Днём Рождения!"
    phrases:
      - "Пусть жизнь удивляет каждый день ✨"
      - "Живи дерзко и ярко 🔥"
      - "Счастья, любви и вдохновения!"
    prompt_template: |
      Сделай открытку из этого фото. Сохрани черты лица и позу.
      Открытка ко Дню рождения с текстом [{user_phrase}] и [{fixed_line}].
      Открытка сделана в стиле: А bold editorial fashion illustration rendered in thick oil pastel or wax crayon, 
      with chunky, textured strokes on visible sketchbook paper. It should feel chic and modern, 
      focusing on outfit and pose through expressive color blocks rather than outlines or realism.
      Формат {format}.
    default_quality: "high"
    model: "gpt-image-1.5"

formats:
  "3:4":
    size: "1024x1536"
  "4:3":
    size: "1536x1024"

limits:
  per_user_per_day: 5






