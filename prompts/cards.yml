holidays:
  mar8:
    title: "8 марта"
    fixed_line: "С 8 марта!"
    phrases:
      - "Пусть твоё сердце остаётся наполненным любовью✨"
      - "Всегда расцветай, как цветок💐"
      - "Пусть твоя жизнь будет наполнена красками"
      - "Сияй каждый день"
      - "Мир с тобой прекраснее"
    prompt_template: |
      Сделай открытку из этого фото. Сохрани черты лица и позу.
      Открытка должна быть посвящена 8 марта с текстом [{user_phrase}] и [{fixed_line}].
      Открытка сделана в стиле: А bold editorial fashion illustration rendered in thick oil pastel or wax crayon, 
      with chunky, textured strokes on visible sketchbook paper. It should feel chic and modern, 
      focusing on outfit and pose through expressive color blocks rather than outlines or realism.
      Формат {format}.
    default_quality: "low"
    model: "gpt-image-1-mini"

